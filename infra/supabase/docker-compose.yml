# infra/supabase/docker-compose.yml
#
# Stack self-hosted de Supabase para el servidor del despacho (feature
# 002-supabase-docker-stack). Ver specs/002-supabase-docker-stack/ para el
# detalle de la especificación, el plan y las decisiones de research.md.
#
# Uso:
#   cp .env.example .env   # completar secretos reales, ver contracts/env-contract.md
#   docker compose up -d
#   ./scripts/healthcheck.sh
#
# Este stack es independiente del docker-compose.yml raíz del monorepo, que
# sigue siendo solo la referencia del flujo de desarrollo local vía Supabase CLI.

name: control-contable-supabase

services:
  db:
    image: supabase/postgres:${POSTGRES_IMAGE_TAG}
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./volumes/db/roles.sql:/docker-entrypoint-initdb.d/init-scripts/99-roles.sql:ro
      - ./volumes/db/jwt.sql:/docker-entrypoint-initdb.d/init-scripts/99-jwt.sql:ro
      - ./volumes/db/realtime.sql:/docker-entrypoint-initdb.d/migrations/99-realtime.sql:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY}
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'postgres', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 10

  auth:
    image: supabase/gotrue:${GOTRUE_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}

      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}

      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_DISABLE_SIGNUP: 'true'

      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}

      GOTRUE_EXTERNAL_EMAIL_ENABLED: 'true'
      GOTRUE_MAILER_AUTOCONFIRM: 'false'
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:9999/health']
      interval: 5s
      timeout: 5s
      retries: 10

  rest:
    image: postgrest/postgrest:${POSTGREST_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: 'false'
    healthcheck:
      test: ['CMD-SHELL', "timeout 1 bash -c '</dev/tcp/127.0.0.1/3000' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  storage:
    image: supabase/storage-api:${STORAGE_API_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      POSTGREST_URL: http://rest:3000
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      STORAGE_BACKEND: file
      TENANT_ID: control-contable
      REGION: local
      GLOBAL_S3_BUCKET: control-contable
      ENABLE_IMAGE_TRANSFORMATION: 'false'
    volumes:
      - storage-data:/var/lib/storage
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:5000/status']
      interval: 5s
      timeout: 5s
      retries: 10

  realtime:
    image: supabase/realtime:${REALTIME_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${JWT_SECRET}
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: 'false'
      DNS_NODES: "''"
      FLY_APP_NAME: realtime
      RLIMIT_NOFILE: '10000'
      SEED_SELF_HOST: 'true'
    healthcheck:
      test: ['CMD-SHELL', "timeout 1 bash -c '</dev/tcp/127.0.0.1/4000' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  meta:
    image: supabase/postgres-meta:${POSTGRES_META_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB}
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', "timeout 1 bash -c '</dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  studio:
    image: supabase/studio:${STUDIO_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      meta:
        condition: service_started
      rest:
        condition: service_started
    environment:
      # Next.js debe escuchar en todas las interfaces del contenedor para que
      # tanto el healthcheck (127.0.0.1) como el mapeo de puertos de Docker
      # (BIND_ADDRESS) lo alcancen.
      HOSTNAME: '0.0.0.0'
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${API_EXTERNAL_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
    ports:
      # Solo interfaz interna/VPN — nunca 0.0.0.0 (ver research.md §4 y FR-005)
      - '${BIND_ADDRESS}:${STUDIO_PORT}:3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:3000/api/profile'').then((r) => {if (r.status !== 200) throw new Error(r.status)})"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  kong:
    image: kong:${KONG_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      auth:
        condition: service_healthy
      rest:
        condition: service_healthy
      storage:
        condition: service_healthy
      realtime:
        condition: service_healthy
    entrypoint: ['/bin/sh', '/home/kong/kong-entrypoint.sh']
    volumes:
      - ./kong.yml.template:/home/kong/kong.yml.template:ro
      - ./kong-entrypoint.sh:/home/kong/kong-entrypoint.sh:ro
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    ports:
      # Solo interfaz interna/VPN — nunca 0.0.0.0 (ver research.md §4 y FR-005)
      - '${BIND_ADDRESS}:${KONG_API_PORT}:8000'
    healthcheck:
      test: ['CMD', 'kong', 'health']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
  storage-data:
